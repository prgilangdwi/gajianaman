<!doctype html>
<html lang="id">
  <head>
    <!-- Charset (must be first) -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO & Description -->
    <title>Gajian Aman — AI-Powered Personal Finance for Indonesian Workers</title>
    <meta name="description" content="Track expenses, manage budgets, and achieve financial goals with intelligent AI insights. Built for Indonesian salaried workers. Lighthouse ≥90 | WCAG AAA accessible." />
    <meta name="keywords" content="finance tracker, budget planner, expense manager, personal finance, Indonesia, AI assistant" />
    <meta name="author" content="Gajian Aman (Gilang Dwi)" />
    <link rel="canonical" href="https://gajianaman.xyz" />

    <!-- Open Graph (Social Media) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gajianaman.xyz" />
    <meta property="og:title" content="Gajian Aman — Safe Until Payday" />
    <meta property="og:description" content="AI-powered personal finance tracker for Indonesian workers. Track, budget, and achieve financial goals." />
    <meta property="og:image" content="https://gajianaman.xyz/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="id_ID" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://gajianaman.xyz" />
    <meta name="twitter:title" content="Gajian Aman — Safe Until Payday" />
    <meta name="twitter:description" content="AI-powered personal finance tracker for Indonesian workers." />
    <meta name="twitter:image" content="https://gajianaman.xyz/og-image.png" />

    <!-- Branding & Theme -->
    <meta name="theme-color" content="#4AE54A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gajian Aman" />

    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://api.anthropic.com; frame-ancestors 'none';" />

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/png" href="/dark-logo.png" />
    <link rel="apple-touch-icon" href="/dark-logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://api.supabase.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.anthropic.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
